// Planet
const pc=document.getElementById('planet-canvas'),pctx2=pc.getContext('2d');
let planetT=0,planetActive=false;
function drawPlanet(){
  if(!planetActive)return;
  planetT+=0.008;
  const W=340,H=340,cx=170,cy=170,R=110;
  pctx2.clearRect(0,0,W,H);
  pctx2.fillStyle='#000008';pctx2.fillRect(0,0,W,H);
  if(!drawPlanet.stars)drawPlanet.stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,o:Math.random()}));
  drawPlanet.stars.forEach(s=>{
    const tw=s.o*(0.5+0.5*Math.sin(planetT*2+s.x));
    pctx2.beginPath();pctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
    pctx2.fillStyle=`rgba(255,255,255,${tw.toFixed(2)})`;pctx2.fill();
  });
  planetColors.forEach((col,ci)=>{
    const[r,g,b]=[parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16)];
    for(let h=4;h>=1;h--){
      const hr=R+h*18+Math.sin(planetT+ci*0.4+h)*6;
      const alpha=(0.04/h)*(0.7+0.3*Math.sin(planetT*0.7+ci));
      const grad=pctx2.createRadialGradient(cx,cy,R*0.9,cx,cy,hr);
      grad.addColorStop(0,`rgba(${r},${g},${b},${(alpha*3).toFixed(3)})`);
      grad.addColorStop(0.5,`rgba(${r},${g},${b},${alpha.toFixed(3)})`);
      grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
      pctx2.beginPath();pctx2.arc(cx,cy,hr,0,Math.PI*2);pctx2.fillStyle=grad;pctx2.fill();
    }
  });
  const sphere=pctx2.createRadialGradient(cx-30,cy-30,10,cx,cy,R);
  sphere.addColorStop(0,'#1a1440');sphere.addColorStop(0.4,'#0d0d28');sphere.addColorStop(1,'#050510');
  pctx2.beginPath();pctx2.arc(cx,cy,R,0,Math.PI*2);pctx2.fillStyle=sphere;pctx2.fill();
  pctx2.save();pctx2.beginPath();pctx2.arc(cx,cy,R,0,Math.PI*2);pctx2.clip();
  [{x:cx-20,y:cy-30,w:55,h:40,rot:.3},{x:cx+30,y:cy+10,w:35,h:50,rot:-.2},{x:cx-55,y:cy+20,w:40,h:30,rot:.5},{x:cx-10,y:cy+40,w:60,h:25,rot:.1}].forEach(l=>{
    pctx2.save();pctx2.translate(l.x,l.y);pctx2.rotate(l.rot+planetT*0.01);
    pctx2.beginPath();pctx2.ellipse(0,0,l.w,l.h,0,0,Math.PI*2);
    pctx2.fillStyle='rgba(20,35,20,0.6)';pctx2.fill();pctx2.restore();
  });
  pctx2.restore();
  const rim=pctx2.createRadialGradient(cx,cy,R-8,cx,cy,R+20);
  rim.addColorStop(0,'rgba(100,80,200,0)');rim.addColorStop(0.5,'rgba(100,80,200,0.12)');rim.addColorStop(1,'rgba(60,40,160,0)');
  pctx2.beginPath();pctx2.arc(cx,cy,R+20,0,Math.PI*2);pctx2.fillStyle=rim;pctx2.fill();
  [0,0.33,0.66].forEach((off,i)=>{
    const a=((planetT*0.3+off)%1),rr=R+a*80,al=(1-a)*0.3;
    const col=planetColors[i%planetColors.length];
    const[r2,g2,b2]=[parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16)];
    pctx2.beginPath();pctx2.arc(cx,cy,rr,0,Math.PI*2);
    pctx2.strokeStyle=`rgba(${r2},${g2},${b2},${al.toFixed(3)})`;pctx2.lineWidth=1.5;pctx2.stroke();
  });
  requestAnimationFrame(drawPlanet);
}

    const col=cols[(r-1)%cols.length]||'#a78bfa',alpha=0.07+level*.006;
    const g=pctx.createRadialGradient(cx,cy,0,cx,cy,pulse);
    g.addColorStop(0,col+Math.floor(alpha*4*255).toString(16).padStart(2,'0'));
    g.addColorStop(.5,col+Math.floor(alpha*255).toString(16).padStart(2,'0'));
    g.addColorStop(1,col+'00');
    pctx.beginPath();pctx.arc(cx,cy,pulse,0,Math.PI*2);pctx.fillStyle=g;pctx.fill();
  }
  const cg=pctx.createRadialGradient(cx,cy,0,cx,cy,8);
  cg.addColorStop(0,'rgba(220,210,255,.95)');cg.addColorStop(1,'rgba(167,139,250,0)');
  pctx.beginPath();pctx.arc(cx,cy,8,0,Math.PI*2);pctx.fillStyle=cg;pctx.fill();
  document.getElementById('my-aura-label').textContent=LEVEL_NAMES[Math.min(5,Math.floor(myShareCount/3))];
  requestAnimationFrame(drawPA);
})();

// Audio
let actx=null;
function playSound(id){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const s=SENSES.find(x=>x.id===id);if(!s)return;
    s.freqs.forEach(([freq,delay,vol,at,dur])=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,actx.currentTime+delay);
      g.gain.linearRampToValueAtTime(vol,actx.currentTime+delay+at);
      g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+delay+dur);
      o.start(actx.currentTime+delay);o.stop(actx.currentTime+delay+dur+.1);
    });
  }catch(e){}
}

// Main draw
let T=0;
(function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);T+=0.016;
  auraPoints.forEach(p=>{
    const pt=map.latLngToContainerPoint([p.lat,p.lng]);
    const x=pt.x,y=pt.y;
    const s=SENSES.find(s=>s.id===p.sense),col=s?s.color:'#a78bfa';
    const life=Math.min(1,(Date.now()-p.born)/2000);
    const pulse=1+Math.sin(T*1.4+p.phase)*.07;
    const baseR=(45+p.intensity*35)*pulse;
    for(let ring=3;ring>=1;ring--){
      const r=baseR*(ring/1.5)*life,alpha=(0.07/ring)*life*p.intensity;
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,col+Math.floor(alpha*4*255).toString(16).padStart(2,'0'));
      g.addColorStop(.5,col+Math.floor(alpha*255).toString(16).padStart(2,'0'));
      g.addColorStop(1,col+'00');
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();ctx.arc(x,y,4.5*life,0,Math.PI*2);ctx.fillStyle=col+'dd';ctx.fill();
  });
  ripples=ripples.filter(r=>r.age<1);
  ripples.forEach(r=>{
    r.age+=0.004;
    const pt=map.latLngToContainerPoint([r.lat,r.lng]);
    const x=pt.x,y=pt.y;
    [1,.65,.35].forEach((scale,i)=>{
      const delay=i*.18;
      if(r.age>delay){
        const a=r.age-delay,rad=a*260*scale,al=(1-a)*.5*(1-i*.2);
        ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
        ctx.strokeStyle=r.color+Math.floor(Math.max(0,al)*255).toString(16).padStart(2,'0');
        ctx.lineWidth=1.5-i*.4;ctx.stroke();
      }
    });
  });
  requestAnimationFrame(draw);
})();

// KITT wave
let waveRaf=null,waveStartTs=0,waveColor='#a78bfa';
const WAVE_DUR=9000;
function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function hexRGB(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}
function animateWave(ts){
  try{
    const elapsed=ts-waveStartTs,progress=Math.min(elapsed/WAVE_DUR,1);
    let crest;
    if(progress<0.38)crest=easeIO(progress/0.38);
    else if(progress<0.62)crest=1;
    else crest=easeIO(1-(progress-0.62)/0.38);
    const[r,g,b]=hexRGB(waveColor);
    ORB_IDS.forEach((id,i)=>{
      const orb=document.getElementById(id);if(!orb)return;
      const pos=i/4,dist=Math.abs(crest-pos);
      const bloom=Math.exp(-dist*dist*9);
      const shimmer=0.86+0.14*Math.sin(ts*0.004+i*0.95);
      const intensity=Math.min(1,bloom*shimmer);
      if(intensity>0.015){
        const sz=7+intensity*11,glow=Math.round(intensity*44);
        orb.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${waveColor};box-shadow:0 0 ${glow}px ${Math.round(glow/2)}px rgba(${r},${g},${b},${(intensity*.95).toFixed(3)}),0 0 ${glow*2.2}px ${glow}px rgba(${r},${g},${b},${(intensity*.45).toFixed(3)}),0 0 ${glow*4}px ${glow*1.8}px rgba(${r},${g},${b},${(intensity*.18).toFixed(3)});opacity:${(0.18+intensity*0.82).toFixed(3)};flex-shrink:0;transition:none;`;
        const tab=orb.parentElement;
        if(tab)tab.style.color=`rgba(230,220,255,${(0.45+intensity*0.55).toFixed(2)})`;
      } else {
        orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,0.1);box-shadow:none;opacity:0.18;flex-shrink:0;transition:none;`;
        const tab=orb.parentElement;if(tab)tab.style.color='';
      }
    });
    if(progress<1){waveRaf=requestAnimationFrame(animateWave);}
    else{
      waveRaf=null;
      ORB_IDS.forEach((id,i)=>{
        const orb=document.getElementById(id);if(!orb)return;
        const tab=orb.parentElement;
        if(i<=auraLevel){
          orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:#a78bfa;box-shadow:0 0 9px 3px rgba(167,139,250,0.55);opacity:1;flex-shrink:0;transition:all 1s ease;`;
          if(tab){tab.classList.add('active');tab.style.color='';}
        } else {
          orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,0.1);box-shadow:none;opacity:0.3;flex-shrink:0;transition:all 1s ease;`;
          if(tab){tab.classList.remove('active');tab.style.color='';}
        }
      });
    }
  }catch(e){waveRaf=null;}
}
function triggerWave(color){
  if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}
  waveColor=color||'#a78bfa';
  requestAnimationFrame(ts=>{waveStartTs=ts;waveRaf=requestAnimationFrame(animateWave);});
}

// Sense buttons
const scatsEl=document.getElementById('scats'),stip=document.getElementById('stip');
SENSES.forEach(s=>{
  const b=document.createElement('button');
  b.className='sc'+(s.id===selSense?' sel':'');

});

// Feed
function addFeed(text,sense,time,glow,lat,lng){
  const s=SENSES.find(x=>x.id===sense);if(!s)return;
  const feed=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='fi'+(glow?' glow':'');
  d.innerHTML=`<div class="fi-sense" style="color:${s.color}">${s.icon} ${s.label}</div><div class="fi-text">"${text}"</div><div class="fi-meta">${time}</div>`;
  if(lat!=null&&lng!=null)d.onclick=()=>map.flyTo([lat,lng],16,{duration:1.2});
  feed.insertBefore(d,feed.firstChild);
  if(glow)setTimeout(()=>d.classList.remove('glow'),5000);
  if(feed.children.length>12)feed.removeChild(feed.lastChild);
}

function showMsg(txt){
  const el=document.getElementById('pmsg');

}
function closeExplore(){const ep=document.getElementById('explore-panel');if(ep)ep.classList.remove('open');}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    const i=+tab.dataset.i;

    auraLevel=i;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

map.on('click',async function(e){
  closeExplore();
  const input=document.getElementById('inp');
  if(input.value.trim()){submit(e.latlng.lat,e.latlng.lng,input.value);input.value='';return;}
  const existing=auraPoints.filter(p=>map.distance([p.lat,p.lng],[e.latlng.lat,e.latlng.lng])<100);
  const s=SENSES.find(s=>s.id===selSense);
  let streetName='this location';
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&zoom=17`);
    const d=await res.json();
    if(d&&d.address)streetName=d.address.road||d.address.pedestrian||d.address.footway||d.display_name?.split(',')[0]||streetName;
  }catch(_){streetName=`${e.latlng.lat.toFixed(4)}°N, ${Math.abs(e.latlng.lng).toFixed(4)}°${e.latlng.lng<0?'W':'E'}`;}
  const senseListHTML=existing.length?'<div class="pop-sense-list">'+existing.slice(0,3).map(p=>{
    const ps=SENSES.find(x=>x.id===p.sense);
    return `<div class="pop-sense-item" style="border-left-color:${ps.color}">${ps.icon} "${p.text.substring(0,52)}${p.text.length>52?'…':''}"</div>`;
  }).join('')+'</div>':'';
  L.popup({className:'aura-popup',closeButton:true,maxWidth:250}).setLatLng(e.latlng).setContent(`
    <div class="pop-title">${existing.length?'Aura detected':'Aura forming'}</div>
    <div class="pop-street">📍 ${streetName}</div>
    <div class="pop-aura" style="color:${s.color}">${existing.length?`${existing.length} sense${existing.length>1?'s':''} shared here`:'No senses shared yet — be the first'}</div>
    ${senseListHTML}
    <div class="pop-action" style="margin-top:5px">${existing.length?'Type below and click here to add your sense':'Type below and click here to energize this spot'}</div>
  `).openOn(map);
});

function submit(lat,lng,text){
  const s=SENSES.find(s=>s.id===selSense);if(!s)return;
  fetch(`${SUPABASE_URL}/rest/v1/sense_sharings`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({text,sense:selSense,lat,lng})}).catch(e=>console.log('save error',e));
  auraPoints.push({lat,lng,sense:selSense,text,born:Date.now(),intensity:1,phase:Math.random()*Math.PI*2});
  ripples.push({lat,lng,color:s.color,age:0});
  if(!planetColors.includes(s.color))planetColors.push(s.color);
  addFeed(text,selSense,'just now',true,lat,lng);
  playSound(selSense);
  shareCount++;myShareCount++;
  triggerWave(s.color);
  if(shareCount%4===0&&auraLevel<4){
    auraLevel++;
    setTimeout(()=>{
      showMsg(LEVEL_MSGS[auraLevel]);
      if(auraLevel===4){showPlanet();return;}
      map.flyTo(ZOOMS[auraLevel],ZOOMS[auraLevel][2],{duration:2.5,easeLinearity:.35});
      setTimeout(()=>map.flyTo(ZOOMS[0],ZOOMS[0][2],{duration:2.5,easeLinearity:.35}),4000);
    },6000);
  } else {
    setTimeout(()=>showMsg(MSGS[Math.floor(Math.random()*MSGS.length)]),500);
  }
}

document.getElementById('sg').onclick=async()=>{

  showMsg('Sensing the aura of '+q+'...');
  try{

    if(d&&d.length){map.flyTo([+d[0].lat,+d[0].lon],17,{duration:2});showMsg('Sensing the aura of '+d[0].display_name.split(',')[0]+'...');}

};
