<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurasense</title>
<meta name="description" content="Aurasense — coming soon.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(62% 60% at 50% 40%, #17142e 0%, #0c0a18 55%, #07060e 100%);
    color:#f3eeff;
    font-family:"Helvetica Neue","Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100svh;overflow:hidden;position:relative;
  }
  .stage{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:6vw}
  .glow{
    position:absolute;top:50%;left:50%;
    width:min(80vw,560px);height:min(80vw,560px);
    transform:translate(-50%,-58%);
    border-radius:50%;
    background:
      radial-gradient(closest-side at 45% 43%, rgba(196,181,253,.55), transparent 72%),
      radial-gradient(closest-side at 59% 57%, rgba(255,159,192,.42), transparent 72%),
      radial-gradient(closest-side at 52% 52%, rgba(255,214,166,.30), transparent 64%),
      radial-gradient(closest-side at 50% 46%, rgba(255,255,255,.75), transparent 22%);
    filter:blur(6px);
    animation:breathe 6.5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes breathe{
    0%,100%{transform:translate(-50%,-58%) scale(1);opacity:.82}
    50%{transform:translate(-50%,-58%) scale(1.06);opacity:1}
  }
  .mark{position:relative;z-index:1}
  .word{
    font-weight:300;
    font-size:clamp(2.1rem,9vw,4.6rem);
    letter-spacing:.34em;
    text-transform:lowercase;
    color:#f5f1ff;
    text-shadow:0 0 36px rgba(196,181,253,.55), 0 0 14px rgba(255,255,255,.22);
    padding-left:.34em;
  }
  .soon{
    margin-top:2.1em;
    font-size:clamp(.66rem,2.4vw,.8rem);
    letter-spacing:.5em;
    text-transform:uppercase;
    color:#9a90c2;
    padding-left:.5em;
  }
  @media (prefers-reduced-motion:reduce){
    .glow{animation:none;opacity:.95}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="mark">
      <div class="word">aurasense</div>
      <div class="soon">coming soon</div>
    </div>
  </div>
</body>
</html>
