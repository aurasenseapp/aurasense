<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurasense — The Living Aura of Humanity</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
.as-breathe{transform-box:fill-box;transform-origin:center;animation:as-br 6s ease-in-out infinite}
@keyframes as-br{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.07);opacity:1}}
.as-shimmer{animation:as-sh 5s ease-in-out infinite}
@keyframes as-sh{0%,100%{opacity:.45}50%{opacity:.95}}
.as-drift{transform-box:fill-box;transform-origin:center;animation:as-dr 6s ease-in-out infinite}
@keyframes as-dr{0%,100%{transform:translateY(2px)}50%{transform:translateY(-3px)}}
.as-wave{transform-box:fill-box;transform-origin:center;animation:as-wv 4.5s ease-in-out infinite}
@keyframes as-wv{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.as-flicker{animation:as-fl 3.7s ease-in-out infinite}
@keyframes as-fl{0%,100%{opacity:.5}22%{opacity:.95}38%{opacity:.4}61%{opacity:.85}80%{opacity:.45}}
@keyframes as-gr{0%,100%{stroke-dashoffset:0.4}50%{stroke-dashoffset:0}}
.as-growShimmer{animation:as-gr 8s ease-in-out infinite, as-sh 5s ease-in-out infinite}
.as-slowShimmer{animation:as-ssh 13s ease-in-out infinite}
@keyframes as-ssh{0%,100%{opacity:.55}50%{opacity:.97}}
.as-wiggle{transform-box:fill-box;transform-origin:center;animation:as-wg 5.5s ease-in-out infinite}
@keyframes as-wg{0%,100%{transform:translateX(-1.2px)}50%{transform:translateX(1.2px)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a10;color:#f0f0f0;height:100vh;overflow:hidden}
#map{position:absolute;inset:0;transition:opacity .6s}
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{display:none!important}
canvas#ac{position:absolute;inset:0;pointer-events:none;z-index:500}
#ui{position:absolute;inset:0;pointer-events:none;z-index:1000}
#planet-view{position:absolute;inset:0;background:#000008;display:none;align-items:center;justify-content:center;z-index:600;flex-direction:column}
#planet-view.show{display:flex}
#planet-canvas{border-radius:50%}
#planet-label{margin-top:20px;font-size:13px;color:#9d8fcc;letter-spacing:.08em;text-align:center;font-style:italic}
#planet-back{margin-top:14px;padding:7px 18px;border-radius:10px;border:0.5px solid rgba(167,139,250,.3);background:rgba(167,139,250,.1);color:#c4b5fd;font-size:12px;cursor:pointer;font-family:inherit;pointer-events:all;transition:all .2s}
#planet-back:hover{background:rgba(167,139,250,.22)}
#hdr1{position:absolute;top:14px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between;pointer-events:all}

#logo p{font-size:10px;color:#6860a0;letter-spacing:.05em;margin-top:1px}
#social{display:flex;gap:5px;align-items:center}
.soc-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid rgba(255,255,255,.1);background:rgba(10,10,20,.88);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .2s;color:#9d8fcc;font-weight:600}
.soc-btn:hover{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.12);transform:scale(1.1)}
.soc-tip{position:fixed;background:rgba(15,12,25,.98);border:0.5px solid rgba(167,139,250,.3);border-radius:8px;padding:5px 9px;font-size:10px;color:#9d8fcc;white-space:nowrap;z-index:9999;pointer-events:none;display:none}
#hdr2{position:absolute;top:52px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between;pointer-events:all;gap:10px}
#tabs{display:flex;gap:1px;background:rgba(10,10,20,.88);border:0.5px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 5px;backdrop-filter:blur(8px);flex-shrink:0}
.tab{font-size:11px;padding:5px 9px;border-radius:14px;border:none;background:transparent;color:#7870a0;cursor:pointer;transition:color .3s;letter-spacing:.03em;display:flex;align-items:center;gap:4px;font-family:inherit;white-space:nowrap;pointer-events:all}
.tab:hover{color:#c4b5fd}
.tab.active{color:#c4b5fd}
.tab-orb{width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,.12);flex-shrink:0;transition:background .3s,box-shadow .3s}
.tab.active .tab-orb{background:#c4b5fd;box-shadow:0 0 7px rgba(196,181,253,.9)}
.fi-loc{font-size:9.5px;color:#9d8fcc;margin-top:2px;font-style:italic}
@keyframes searchPulse{0%{transform:scale(1);box-shadow:0 0 10px 3px rgba(167,139,250,.6)}50%{transform:scale(1.35);box-shadow:0 0 18px 7px rgba(167,139,250,.9)}100%{transform:scale(1);box-shadow:0 0 10px 3px rgba(167,139,250,.6)}}
#search-box{display:flex;gap:5px;flex-shrink:0}
#si{background:rgba(10,10,20,.9);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 10px;font-size:11px;color:#e0d8ff;outline:none;width:160px;font-family:inherit}
#si::placeholder{color:#5a5270}
#si:focus{border-color:rgba(167,139,250,.4)}
#sg{padding:6px 10px;border-radius:10px;border:0.5px solid rgba(167,139,250,.3);background:rgba(167,139,250,.1);color:#c4b5fd;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
#sg:hover{background:rgba(167,139,250,.2)}
#my-aura{position:absolute;left:16px;top:100px;pointer-events:all;width:84px}
#my-aura-title{font-size:9px;color:#9d8fcc;text-align:center;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
#pac{display:block;margin:0 auto}
#my-aura-label{font-size:10px;color:#7870a0;text-align:center;margin-top:3px}
#explore-btn{position:absolute;left:110px;top:148px;pointer-events:all}
#ebtn{padding:6px 12px;border-radius:10px;border:0.5px solid rgba(167,139,250,.25);background:rgba(10,10,20,.88);color:#9d8fcc;font-size:11px;cursor:pointer;font-family:inherit;transition:all .3s;backdrop-filter:blur(6px)}
#ebtn:hover{border-color:rgba(167,139,250,.5);color:#c4b5fd;background:rgba(167,139,250,.1)}
#explore-panel{position:absolute;left:16px;top:182px;width:268px;background:rgba(10,10,20,.96);border:0.5px solid rgba(167,139,250,.2);border-radius:14px;padding:13px 14px;backdrop-filter:blur(12px);pointer-events:all;display:none}
#explore-panel.open{display:block}
.ep-title{font-size:11px;color:#9d8fcc;margin-bottom:10px;letter-spacing:.03em}
.ep-opt{padding:9px 12px;border-radius:10px;border:0.5px solid rgba(255,255,255,.08);background:transparent;margin-bottom:6px;cursor:pointer;transition:all .25s;text-align:left;font-family:inherit;width:100%}
.ep-opt:hover{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.07)}
.ep-opt-title{font-size:12px;color:#c4b5fd;margin-bottom:2px}
.ep-opt-sub{font-size:10px;color:#7870a0;line-height:1.5}
#feed{position:absolute;right:16px;top:100px;width:205px;max-height:50vh;overflow-y:auto;pointer-events:all}
#feed::-webkit-scrollbar{width:2px}
#feed::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:2px}
.fi{background:rgba(10,10,20,.9);border:0.5px solid rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;margin-bottom:5px;animation:fadeUp .4s ease;cursor:pointer;transition:border-color .4s,box-shadow .4s}
.fi:hover{border-color:rgba(167,139,250,.3)}
.fi.glow{border-color:rgba(167,139,250,.55);box-shadow:0 0 18px rgba(167,139,250,.28)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi-sense{font-size:10px;font-weight:500;margin-bottom:3px;letter-spacing:.04em}
.fi-text{font-size:11px;color:#c0b8d8;line-height:1.5;font-style:italic}
.fi-meta{font-size:10px;color:#4a4260;margin-top:3px}
#stip{position:fixed;background:rgba(10,8,20,.97);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;font-size:11px;color:#c0b8d8;max-width:185px;line-height:1.6;pointer-events:none;opacity:0;transition:opacity .2s;z-index:9999;font-style:italic}
#panel{position:absolute;bottom:16px;left:16px;right:16px;pointer-events:all}
#pi{background:rgba(10,10,20,.93);border:0.5px solid rgba(167,139,250,.18);border-radius:16px;padding:12px 14px;backdrop-filter:blur(12px)}
#ptitle{font-size:12px;color:#9d8fcc;margin-bottom:9px}
#scats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.sc{font-size:11px;padding:4px 9px;border-radius:20px;border:0.5px solid rgba(255,255,255,.1);background:transparent;color:#9d8fcc;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:3px}
.sc:hover,.sc.sel{border-color:var(--c);color:var(--c);background:rgba(255,255,255,.05)}
#srow{display:flex;gap:7px}
#inp{flex:1;background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:7px 11px;font-size:12px;color:#e0d8ff;outline:none;font-family:inherit}
#inp::placeholder{color:#5a5270}
#inp:focus{border-color:rgba(167,139,250,.35)}
#sbtn{padding:8px 13px;border-radius:10px;border:0.5px solid rgba(167,139,250,.35);background:rgba(167,139,250,.1);color:#c4b5fd;font-size:11px;cursor:pointer;font-family:inherit;transition:all .3s;white-space:nowrap}
#sbtn:hover{background:rgba(167,139,250,.25);box-shadow:0 0 14px rgba(167,139,250,.2)}
#pmsg{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:#c4b5fd;font-style:italic;opacity:0;pointer-events:none;text-align:center;text-shadow:0 0 22px rgba(167,139,250,.9);transition:opacity .5s;letter-spacing:.03em;white-space:nowrap}

.aura-popup .mapboxgl-popup-content{background:rgba(10,10,20,.96)!important;border:0.5px solid rgba(167,139,250,.3)!important;border-radius:12px!important;box-shadow:0 0 20px rgba(167,139,250,.15)!important;color:#e0d8ff!important}
.aura-popup .mapboxgl-popup-tip{background:rgba(10,10,20,.96)!important}
.aura-popup .mapboxgl-popup-content-inner{margin:11px 13px!important;font-size:12px;line-height:1.6}
.pop-title{font-size:13px;color:#e0d8ff;font-weight:500;margin-bottom:2px}
.pop-street{font-size:11px;color:#a78bfa;margin-bottom:4px;font-style:italic}
.pop-aura{font-size:11px;margin-bottom:4px}
.pop-action{font-size:11px;color:#7870a0;font-style:italic}
.pop-sense-list{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.pop-sense-item{font-size:11px;color:#c0b8d8;font-style:italic;padding:4px 8px;background:rgba(255,255,255,.04);border-radius:6px;cursor:pointer;border-left:2px solid transparent;transition:background .2s}
.pop-sense-item:hover{background:rgba(167,139,250,.1)}

<body>
<div id="map"></div>
<canvas id="ac"></canvas>
<div id="planet-view">

  <div id="planet-label">The living aura of humanity<br><span style="font-size:11px;opacity:.6">sensing the world together</span></div>
  <button id="planet-back">← Return to street view</button>
</div>
<div id="ui">
  <div id="hdr1">
    <div id="logo"><h1>Aurasense</h1><p>The living aura of humanity, sensed together</p></div>

    <div id="tabs">

      <button class="tab" data-i="2"><span class="tab-orb" id="orb2"></span>Region</button>
      <button class="tab" data-i="3"><span class="tab-orb" id="orb3"></span>Nation</button>
      <button class="tab" data-i="4"><span class="tab-orb" id="orb4"></span>Planet</button>
    </div>
    <div id="search-box">
      <input id="si" placeholder="Street, town, postcode..."/>
      <button id="sg">Go</button>
    </div>
  </div>
  <div id="my-aura">
    <div id="my-aura-title">My Aura</div>
    <canvas id="pac" width="80" height="80"></canvas>
    <div id="my-aura-label">Aurasenser</div>

  <div id="explore-btn"><button id="ebtn">✦ Read the aura of this place</button></div>

    <div class="ep-title">How would you like to read this aura?</div>
    <button class="ep-opt" id="ep1">
      <div class="ep-opt-title">What Aurasensers felt here</div>
      <div class="ep-opt-sub">Sense sharings from people who live, lived, or passed through</div>
    </button>
    <button class="ep-opt" id="ep2">
      <div class="ep-opt-title">What Aurasensers are feeling here</div>
      <div class="ep-opt-sub">Live sense sharings from people present in this area right now</div>
    </button>
    <button class="ep-opt" id="ep3">
      <div class="ep-opt-title">Aura pulse from the wider world</div>
      <div class="ep-opt-sub">Public sentiment, news and social media — coming in v1</div>
    </button>
    <button class="ep-opt" id="ep4">
      <div class="ep-opt-title">Conscious Trajectory</div>
      <div class="ep-opt-sub">Where this place's aura is heading — coming in v1</div>
    </button>
  </div>
  <div id="feed"></div>
  <div id="stip"></div>
  <div id="panel">
    <div id="pi">
      <div id="ptitle">Energize the aura with your senses</div>
      <div id="scats"></div>
      <div id="srow">
        <input id="inp" placeholder="What does this place feel like right now?"/>
        <button id="sbtn">Offer your sense to the aura</button>
      </div>
    </div>
  </div>
  <div id="pmsg"></div>
</div>

const pc=document.getElementById('planet-canvas'),pctx2=pc.getContext('2d');
let planetT=0,planetActive=false;
function drawPlanet(){
  if(!planetActive)return;

  const W=340,H=340,cx=170,cy=170,R=110;
  pctx2.clearRect(0,0,W,H);

  drawPlanet.stars.forEach(s=>{
    const tw=s.o*(0.5+0.5*Math.sin(planetT*2+s.x));
    pctx2.beginPath();pctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
    pctx2.fillStyle=`rgba(255,255,255,${tw.toFixed(2)})`;pctx2.fill();
  });
  planetColors.forEach((col,ci)=>{
    const[r,g,b]=[parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16)];
    for(let h=4;h>=1;h--){
      const hr=R+h*18+Math.sin(planetT+ci*0.4+h)*6;
      const alpha=(0.04/h)*(0.7+0.3*Math.sin(planetT*0.7+ci));
      const grad=pctx2.createRadialGradient(cx,cy,R*0.9,cx,cy,hr);
      grad.addColorStop(0,`rgba(${r},${g},${b},${(alpha*3).toFixed(3)})`);
      grad.addColorStop(0.5,`rgba(${r},${g},${b},${alpha.toFixed(3)})`);
      grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
      pctx2.beginPath();pctx2.arc(cx,cy,hr,0,Math.PI*2);pctx2.fillStyle=grad;pctx2.fill();
    }
  });
  const sphere=pctx2.createRadialGradient(cx-30,cy-30,10,cx,cy,R);
  sphere.addColorStop(0,'#1a1440');sphere.addColorStop(0.4,'#0d0d28');sphere.addColorStop(1,'#050510');
  pctx2.beginPath();pctx2.arc(cx,cy,R,0,Math.PI*2);pctx2.fillStyle=sphere;pctx2.fill();
  pctx2.save();pctx2.beginPath();pctx2.arc(cx,cy,R,0,Math.PI*2);pctx2.clip();
  [{x:cx-20,y:cy-30,w:55,h:40,rot:.3},{x:cx+30,y:cy+10,w:35,h:50,rot:-.2},{x:cx-55,y:cy+20,w:40,h:30,rot:.5},{x:cx-10,y:cy+40,w:60,h:25,rot:.1}].forEach(l=>{
    pctx2.save();pctx2.translate(l.x,l.y);pctx2.rotate(l.rot+planetT*0.01);
    pctx2.beginPath();pctx2.ellipse(0,0,l.w,l.h,0,0,Math.PI*2);
    pctx2.fillStyle='rgba(20,35,20,0.6)';pctx2.fill();pctx2.restore();
  });
  pctx2.restore();
  const rim=pctx2.createRadialGradient(cx,cy,R-8,cx,cy,R+20);
  rim.addColorStop(0,'rgba(100,80,200,0)');rim.addColorStop(0.5,'rgba(100,80,200,0.12)');rim.addColorStop(1,'rgba(60,40,160,0)');
  pctx2.beginPath();pctx2.arc(cx,cy,R+20,0,Math.PI*2);pctx2.fillStyle=rim;pctx2.fill();
  [0,0.33,0.66].forEach((off,i)=>{
    const a=((planetT*0.3+off)%1),rr=R+a*80,al=(1-a)*0.3;
    const col=planetColors[i%planetColors.length];
    const[r2,g2,b2]=[parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16)];
    pctx2.beginPath();pctx2.arc(cx,cy,rr,0,Math.PI*2);
    pctx2.strokeStyle=`rgba(${r2},${g2},${b2},${al.toFixed(3)})`;pctx2.lineWidth=1.5;pctx2.stroke();
  });
  requestAnimationFrame(drawPlanet);
}

// Audio
let actx=null;
function playSound(id){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const s=SENSES.find(x=>x.id===id);if(!s)return;
    s.freqs.forEach(([freq,delay,vol,at,dur])=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,actx.currentTime+delay);
      g.gain.linearRampToValueAtTime(vol,actx.currentTime+delay+at);
      g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+delay+dur);
      o.start(actx.currentTime+delay);o.stop(actx.currentTime+delay+dur+.1);
    });
  }catch(e){}
}

// Main draw
let T=0;
(function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);T+=0.016;
  auraPoints.forEach((p,i)=>{
    const pt=map.project([p.lng,p.lat]);
    const x=pt.x,y=pt.y;
    const s=SENSES.find(s=>s.id===p.sense),col=s?s.color:'#a78bfa';
    const life=Math.min(1,(Date.now()-p.born)/2000);
    const breath=0.82+Math.sin(T*0.55+i*1.3)*0.30;
    const r=(45+p.intensity*35)*breath*life*Math.pow(2,(map.getZoom()-14)*0.7);
    // Outer glow: single clean gradient, brighter stops (from map-test)
    const glow=ctx.createRadialGradient(x,y,0,x,y,r);
    const swell=(breath-0.52)/0.60; // 0..1 across the breath
    glow.addColorStop(0,    hexA(col,(0.95+0.05*swell)*life));
    glow.addColorStop(0.35, hexA(col,(0.55+0.10*swell)*life));
    glow.addColorStop(1,    hexA(col,0));
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    // Bright little core (from map-test) — the 'harder, more present' centre
    const cr=11*breath*life;
    const core=ctx.createRadialGradient(x,y,0,x,y,cr);
    core.addColorStop(0,hexA('#ffffff',0.9*life));
    core.addColorStop(1,hexA(col,0));
    ctx.fillStyle=core;ctx.beginPath();ctx.arc(x,y,cr,0,Math.PI*2);ctx.fill();
    // living motion — etheric throb, emotional swirl, mental ripple, spiritual edge — colour-matched, no rotation
    if(!p._motion)p._motion=buildMotion();
    const m=p._motion;
    if(!m.fieldColor)m.fieldColor=makeFieldColor(hexRGB(col));
    const fc=m.fieldColor;
    const throb=Math.sin(T*9+i*0.7)*0.5+0.5;
    const bright=life*(0.55+0.45*swell)*(0.86+0.14*throb);
    for(let k=0;k<m.grain.length;k++){
      const gp=m.grain[k];const rr1=gp.r*r;const gx=x+Math.cos(gp.a)*rr1,gy=y+Math.sin(gp.a)*rr1;
      const tw1=Math.sin(T*gp.sp+gp.ph)*0.5+0.5,twS1=Math.pow(tw1,2.2);
      const op1=gp.base*twS1*bright*(1-gp.r*0.25);
      ctx.fillStyle=rgbaArr(fc(gp.r),op1);ctx.beginPath();ctx.arc(gx,gy,gp.size,0,Math.PI*2);ctx.fill();
    }
    for(let w=0;w<m.wisps.length;w++){
      const wp=m.wisps[w];const lifeA=Math.sin(wp.life+T*wp.lsp)*0.5+0.5;
      const wx=x+Math.cos(wp.a0)*wp.r0*r+Math.sin(T*wp.dx+wp.phx)*wp.wander*r;
      const wy=y+Math.sin(wp.a0)*wp.r0*r+Math.cos(T*wp.dy+wp.phy)*wp.wander*r;
      const wr=wp.size*r*(0.85+0.3*lifeA),wA=(0.07+0.17*lifeA)*bright,wc=fc(0.2);
      const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,wr);
      wg.addColorStop(0,rgbaArr(wc,wA));wg.addColorStop(0.4,rgbaArr(wc,wA*0.55));wg.addColorStop(1,rgbaArr(wc,0));
      ctx.fillStyle=wg;ctx.beginPath();ctx.arc(wx,wy,wr,0,Math.PI*2);ctx.fill();
    }
    for(let ri=0;ri<m.ripples.length;ri++){
      const rp=m.ripples[ri];const cyc=((T/rp.period)+rp.phase)%1;
      if(cyc<rp.active){
        const prog=cyc/rp.active,rad=(0.08+prog*1.0)*r;
        const flash=Math.min(1,prog*9)*Math.pow(1-prog,1.5),op2=flash*0.32*bright,rc=fc(Math.min(0.97,prog));
        const feather=[-7,-5,-3,-1.5,0,1.5,3,5,7],weights=[0.05,0.14,0.28,0.42,0.5,0.42,0.28,0.14,0.05];
        for(let fi=0;fi<feather.length;fi++){ctx.lineWidth=1.6;ctx.strokeStyle=rgbaArr(rc,op2*weights[fi]);ctx.beginPath();ctx.arc(x,y,Math.max(0,rad+feather[fi]),0,Math.PI*2);ctx.stroke();}
      }
    }
    const rimC=fc(0.97),rimOp=(0.13+0.06*Math.sin(T*0.6+i))*bright;
    const feather2=[-6,-4,-2,0,2,4,6],weights2=[0.08,0.2,0.38,0.5,0.38,0.2,0.08];
    for(let fi2=0;fi2<feather2.length;fi2++){ctx.lineWidth=1.8;ctx.strokeStyle=rgbaArr(rimC,rimOp*weights2[fi2]);ctx.beginPath();ctx.arc(x,y,Math.max(0,0.97*r+feather2[fi2]),0,Math.PI*2);ctx.stroke();}
    for(let ei=0;ei<m.edge.length;ei++){
      const ep=m.edge[ei];const rr2=ep.r*r;const ex=x+Math.cos(ep.a)*rr2,ey=y+Math.sin(ep.a)*rr2;
      const tw2=Math.sin(T*ep.sp+ep.ph)*0.5+0.5,twS2=Math.pow(tw2,3);
      const band=Math.max(0,1-Math.abs(ep.r-0.98)*1.9),opB=ep.base*twS2*bright*band,ec=fc(0.98);
      ctx.fillStyle=rgbaArr(ec,opB*0.4);ctx.beginPath();ctx.arc(ex,ey,ep.size*1.8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,'+Math.min(1,opB*1.3)+')';ctx.beginPath();ctx.arc(ex,ey,ep.size*0.65,0,Math.PI*2);ctx.fill();
    }
    for(let j=0;j<m.motes.length;j++){
      const mp=m.motes[j];const rr3=mp.r*r*0.82;const mx=x+Math.cos(mp.a)*rr3,my=y+Math.sin(mp.a)*rr3;
      const tw3=Math.sin(T*mp.sp+mp.ph)*0.5+0.5,twS3=Math.pow(tw3,2.5),opM=twS3*(1-mp.r*0.35)*bright;

      ctx.fillStyle='rgba(255,255,255,'+Math.min(1,opM*1.1)+')';ctx.beginPath();ctx.arc(mx,my,0.7,0,Math.PI*2);ctx.fill();
    }
  });

    r.age+=0.004;
    const pt=map.project([r.lng,r.lat]);

function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function hexRGB(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return 'rgba('+r+','+g+','+b+','+a+')';}
function mixRGB(c1,c2,m){return [Math.round(c1[0]+(c2[0]-c1[0])*m),Math.round(c1[1]+(c2[1]-c1[1])*m),Math.round(c1[2]+(c2[2]-c1[2])*m)];}
function rgbaArr(arr,a){return 'rgba('+arr[0]+','+arr[1]+','+arr[2]+','+a+')';}
function makeFieldColor(baseRGB){
  const white=[255,255,255];
  const light=mixRGB(white,baseRGB,0.45);
  const deep=mixRGB(baseRGB,[10,8,20],0.4);
  return function(r){
    if(r<0.16)return mixRGB(white,light,r/0.16);
    if(r<0.5)return mixRGB(light,baseRGB,(r-0.16)/0.34);
    return mixRGB(baseRGB,deep,Math.min(1,(r-0.5)/0.5));
  };
}
function buildMotion(){
  const grain=[];for(let i=0;i<70;i++)grain.push({a:Math.random()*Math.PI*2,r:Math.pow(Math.random(),0.55),ph:Math.random()*Math.PI*2,sp:0.4+Math.random()*1.1,size:0.4+Math.random()*0.5,base:0.05+Math.random()*0.09});
  const wisps=[];for(let i=0;i<3;i++){const bdx=0.75+Math.random()*0.45;wisps.push({a0:Math.random()*Math.PI*2,r0:0.12+Math.random()*0.40,dx:bdx,dy:bdx*(0.8+Math.random()*0.3),phx:Math.random()*Math.PI*2,phy:Math.random()*Math.PI*2,wander:0.16+Math.random()*0.12,life:Math.random()*Math.PI*2,lsp:0.35+Math.random()*0.25,size:0.34+Math.random()*0.18});}
  const ripples=[];for(let i=0;i<2;i++)ripples.push({period:4.5+Math.random()*2.5,phase:Math.random(),active:0.55+Math.random()*0.1});
  const edge=[];for(let i=0;i<35;i++)edge.push({a:Math.random()*Math.PI*2,r:0.90+Math.random()*0.16,ph:Math.random()*Math.PI*2,sp:3+Math.random()*4,size:0.42+Math.random()*0.52,base:0.14+Math.random()*0.17});
  const motes=[];for(let i=0;i<10;i++)motes.push({a:Math.random()*Math.PI*2,r:Math.pow(Math.random(),0.6),ph:Math.random()*Math.PI*2,sp:2+Math.random()*3.2});
  return {grain,wisps,ripples,edge,motes,fieldColor:null};
}
function haversine(la1,lo1,la2,lo2){const R=6371000,toR=Math.PI/180;const dLa=(la2-la1)*toR,dLo=(lo2-lo1)*toR;const a=Math.sin(dLa/2)**2+Math.cos(la1*toR)*Math.cos(la2*toR)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function animateWave(ts){
  try{
    const elapsed=ts-waveStartTs,progress=Math.min(elapsed/WAVE_DUR,1);
    let crest;
    if(progress<0.38)crest=easeIO(progress/0.38);
    else if(progress<0.62)crest=1;
    else crest=easeIO(1-(progress-0.62)/0.38);
    const[r,g,b]=hexRGB(waveColor);
    ORB_IDS.forEach((id,i)=>{
      const orb=document.getElementById(id);if(!orb)return;
      const pos=i/4,dist=Math.abs(crest-pos);
      const bloom=Math.exp(-dist*dist*9);
      const shimmer=0.86+0.14*Math.sin(ts*0.004+i*0.95);
      const intensity=Math.min(1,bloom*shimmer);
      if(intensity>0.015){
        const sz=7+intensity*11,glow=Math.round(intensity*44);
        orb.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${waveColor};box-shadow:0 0 ${glow}px ${Math.round(glow/2)}px rgba(${r},${g},${b},${(intensity*.95).toFixed(3)}),0 0 ${glow*2.2}px ${glow}px rgba(${r},${g},${b},${(intensity*.45).toFixed(3)}),0 0 ${glow*4}px ${glow*1.8}px rgba(${r},${g},${b},${(intensity*.18).toFixed(3)});opacity:${(0.18+intensity*0.82).toFixed(3)};flex-shrink:0;transition:none;`;
        const tab=orb.parentElement;
        if(tab)tab.style.color=`rgba(230,220,255,${(0.45+intensity*0.55).toFixed(2)})`;
      } else {
        orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,0.1);box-shadow:none;opacity:0.18;flex-shrink:0;transition:none;`;
        const tab=orb.parentElement;if(tab)tab.style.color='';
      }
    });
    if(progress<1){waveRaf=requestAnimationFrame(animateWave);}
    else{
      waveRaf=null;
      ORB_IDS.forEach((id,i)=>{
        const orb=document.getElementById(id);if(!orb)return;
        const tab=orb.parentElement;
        if(i===auraLevel){
          orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:#a78bfa;box-shadow:0 0 9px 3px rgba(167,139,250,0.55);opacity:1;flex-shrink:0;transition:all 1s ease;`;
          if(tab){tab.classList.add('active');tab.style.color='';}
        } else {
          orb.style.cssText=`width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,0.1);box-shadow:none;opacity:0.3;flex-shrink:0;transition:all 1s ease;`;
          if(tab){tab.classList.remove('active');tab.style.color='';}
        }
      });
    }
  }catch(e){waveRaf=null;}
}
function triggerWave(color){
  if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}
  waveColor=color||'#a78bfa';
  requestAnimationFrame(ts=>{waveStartTs=ts;waveRaf=requestAnimationFrame(animateWave);});
}

// Zoom the tab levels relative to WHERE THE USER CURRENTLY IS (not fixed London).
// Street stays a close view of the current centre; Town/Region/Nation reverse-geocode
// the current centre and fit the matching real-world boundary.
async function contextualZoom(level){
  const c=map.getCenter();
  if(level===0){ // Street — just a close view of where we are
    flyProgrammatic({center:[c.lng,c.lat],zoom:15,duration:1800});
    return;
  }
  // Which boundary type to look up for each level:
  const typeFor={1:'place',2:'region',3:'country'}[level];
  // Fly to the place's CENTRE at a controlled zoom. We deliberately don't fit the
  // returned bbox for region/nation — a 'region' like England, or a country's full
  // bbox, is so large it zooms right out (the cause of 'Region -> whole UK' and the
  // 'Nation too far / sea on top'). A fixed zoom per level frames it sensibly.
  const z={1:12,2:8.5,3:5.7}[level];
  // Known-good framing when inside the UK (the reverse-geocode is unreliable for
  // London's region/nation; this guarantees sensible frames until the full
  // contextual pass is done).
  const inUK=(c.lng>-8.7&&c.lng<2&&c.lat>49.8&&c.lat<61);
  if(inUK&&level===2){ // Region -> Greater London area
    flyProgrammatic({center:[-0.118,51.509],zoom:9.3,duration:2000,offset:[0,-20]});return;
  }
  if(inUK&&level===3){ // Nation -> whole UK, framed properly
    flyToBounds([[-8.2,49.9],[1.8,59.5]],6);return;
  }
  try{
    const url=`https://api.mapbox.com/geocoding/v5/mapbox.places/${c.lng},${c.lat}.json`+
              `?access_token=${MAPBOX_TOKEN}&types=${typeFor}&limit=1`;
    const r=await fetch(url);const d=await r.json();
    if(d&&d.features&&d.features.length&&d.features[0].center){
      // Town can still frame nicely by bbox if it's small; region/nation use centre+zoom.
      if(level===1&&d.features[0].bbox){
        flyToBounds([[d.features[0].bbox[0],d.features[0].bbox[1]],
                     [d.features[0].bbox[2],d.features[0].bbox[3]]],14.5);
      }else{
        flyProgrammatic({center:d.features[0].center,zoom:z,duration:2000,offset:[0,-30]});
      }
      return;
    }
  }catch(e){}
  flyProgrammatic({center:[c.lng,c.lat],zoom:z,duration:2000,offset:[0,-30]});
}
// Helper: fly the map ourselves, and ignore the move events it generates.
// A timer (a little longer than the flight) clears the flag no matter how many
// intermediate events Mapbox fires — robust where a single-event reset was not.
// One place that controls which level tab is lit (text + glowing orb),
// closes Planet if it was open, and keeps auraLevel in sync.
let searchMarker=null;
let lastSearchPoint=null;  // [lng,lat] of last precise address/POI search
let lastClickPoint=null;   // [lng,lat] of last map click — used when typing then clicking submit
let lastSearchLabel=null;  // the label DOM element of the current marker
let lastSearchName=null;   // the place name string of the current marker
// Drop a soft pin where a precise address/POI was found, to help the user pinpoint it.
function dropSearchMarker(center,placeName){
  if(searchMarker){searchMarker.remove();searchMarker=null;}
  lastSearchPoint=center;  // remember exact spot for precise submission
  // Does this spot already have any aura offerings nearby? (within ~80m)
  const hasAura=auraPoints.some(p=>haversine(p.lat,p.lng,center[1],center[0])<80);
  // Wrapper Mapbox positions; the DOT is the anchor point (sits on the place).
  // The label floats ABOVE via absolute positioning + a connector, so the canvas
  // glow (which paints over the marker area) can't hide it.
  const el=document.createElement('div');
  el.style.cssText='position:relative;width:16px;height:16px;transition:opacity 4.5s ease-in-out;opacity:0;z-index:550;';
  // Floating label, lifted ~80px above the dot, centred over it.
  const lbl=document.createElement('div');
  lbl.textContent=hasAura?('✨ '+(placeName||'This place')):('Awaiting aura offering at '+(placeName||'this place'));
  lastSearchLabel=lbl; lastSearchName=(placeName||'this place');
  lbl.style.cssText='position:absolute;left:50%;bottom:80px;transform:translateX(-50%);'+
    'font-size:10.5px;font-style:italic;color:#f0e9ff;background:rgba(10,8,20,.95);'+
    'padding:4px 10px;border-radius:8px;white-space:nowrap;z-index:30;'+
    'text-shadow:0 0 10px rgba(167,139,250,.9);border:0.5px solid rgba(167,139,250,.5);box-shadow:0 0 14px rgba(0,0,0,.7);';
  el.appendChild(lbl);
  // Connector line from just under the label down toward the dot.
  const conn=document.createElement('div');
  conn.style.cssText='position:absolute;left:50%;bottom:18px;transform:translateX(-50%);'+
    'width:1px;height:62px;background:linear-gradient(rgba(196,181,253,.7),rgba(196,181,253,0));z-index:29;';
  el.appendChild(conn);
  // Inner dot carries the pulse; sits at the wrapper origin = exact place.
  const dot=document.createElement('div');
  dot.style.cssText='width:16px;height:16px;border-radius:50%;background:rgba(196,181,253,.95);'+
    'border:1.5px solid #fff;animation:searchPulse 2.4s ease-in-out infinite;position:relative;z-index:28;';
  el.appendChild(dot);
  searchMarker=new mapboxgl.Marker({element:el}).setLngLat(center).addTo(map);
  if(searchMarker.getElement().parentElement)searchMarker.getElement().parentElement.style.zIndex='550';
  // Fade the marker IN only once the map has settled — arrives with the place, mystically.
  map.once('moveend',()=>{ if(el)el.style.opacity='1'; });
  setTimeout(()=>{ if(el&&el.style.opacity==='0')el.style.opacity='1'; },4500);
  // Pulse (the living invitation) for a good while, then stop and VERY slowly ease
  // down to a soft, still-present glow that lingers as an anchor.
  setTimeout(()=>{ if(dot)dot.style.animation='none'; },16000);
  setTimeout(()=>{ if(el){el.style.transition='opacity 18s ease-in-out';el.style.opacity='0.6';} },17000);
}

async function lookupPlace(lat,lng){
  try{
    const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${MAPBOX_TOKEN}&types=address,poi,neighborhood,place&limit=1`);
    const d=await r.json();
    if(d&&d.features&&d.features.length){
      const f=d.features[0];
      // Street name (no house number) from the result itself.
      const street=f.text||'';
      // Town and country come from the result's context hierarchy.
      let town='',country='';
      (f.context||[]).forEach(cx=>{
        const id=cx.id||'';
        if(id.startsWith('place'))town=cx.text;
        else if(id.startsWith('country'))country=cx.text;
      });
      // Build 'Street, Town, Country' skipping any missing/duplicate parts.
      const parts=[street,town,country].filter((p,idx,arr)=>p&&arr.indexOf(p)===idx);
      return parts.join(', ');
    }
  }catch(e){}
  return null;
}
function submit(lat,lng,text){

  ripples.push({lat,lng,color:s.color,age:0});
  if(!planetColors.includes(s.color))planetColors.push(s.color);
  addFeed(text,selSense,'just now',true,lat,lng);
  lookupPlace(lat,lng).then(place=>{
    if(!place)return;
    const first=document.getElementById('feed').firstChild;
    if(first&&!first.querySelector('.fi-loc')){
      const el=document.createElement('div');el.className='fi-loc';el.textContent='📍 '+place;
      const meta=first.querySelector('.fi-meta');
      first.insertBefore(el,meta);
    }
  });
  playSound(selSense);
  shareCount++;myShareCount++;
  triggerWave(s.color);
  if(shareCount%4===0&&auraLevel<4){
    const here=map.getCenter();
    const hereZoom=map.getZoom();
    const tourZooms=[hereZoom,12,9,5.7];
    
    auraLevel++;
    setTimeout(()=>{
      showMsg(LEVEL_MSGS[auraLevel]);
      if(auraLevel===4){showPlanet();return;}
      flyProgrammatic({center:[here.lng,here.lat],zoom:tourZooms[auraLevel],duration:2500});
      setTimeout(()=>flyProgrammatic({center:[here.lng,here.lat],zoom:hereZoom,duration:2500}),4000);
    },6000);
  } else {
    setTimeout(()=>showMsg(MSGS[Math.floor(Math.random()*MSGS.length)]),500);
  }
}

    submit(lastClickPoint[1],lastClickPoint[0],v);
    lastClickPoint=null;
  if(lastSearchPoint && haversine(lastSearchPoint[1],lastSearchPoint[0],c.lat,c.lng)<150){
    submit(lastSearchPoint[1],lastSearchPoint[0],v);
    // Update the marker label to celebrate the fresh offering, then mellow after an hour.
    if(lastSearchLabel){
      lastSearchLabel.textContent='✨ Aura just offered at '+lastSearchName;
      const lblRef=lastSearchLabel, nameRef=lastSearchName;
      setTimeout(()=>{ if(lblRef)lblRef.textContent='✨ Aura offered at '+nameRef; },3600000);
    }
  } else {
    const j=()=>(Math.random()-.5)*.0006;  // tiny jitter only, ~30m, so stacked auras don't overlap exactly
    submit(c.lat+j(),c.lng+j(),v);
  }
  document.getElementById('inp').value='';
};
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('sbtn').click()});

document.getElementById('sg').onclick=async()=>{
  const q=document.getElementById('si').value.trim();if(!q)return;
  showMsg('Sensing the aura of '+q+'...');
  try{
    // Mapbox geocoding: returns a bounding box + result type, so we can frame
    // the find correctly — a country fills the view, a street zooms in close.
    const cc=map.getCenter();
    const url=`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json`+
              `?access_token=${MAPBOX_TOKEN}&limit=1&proximity=${cc.lng},${cc.lat}`;
    const res=await fetch(url);
    const d=await res.json();
    if(d&&d.features&&d.features.length){
      const f=d.features[0];
      const t=(f.place_type&&f.place_type[0])||'';
      let name=f.text||f.place_name.split(',')[0];
      if(t==='address'&&f.address)name=f.address+' '+name;  // prepend house number
      // Light the matching level tab WITHOUT letting this search overwrite the
      // tabs' remembered home positions (that leak caused 'Region -> last search').
      const levelFor={country:3,region:2,district:2,postcode:1,place:1,
                      locality:1,neighborhood:0,address:0,poi:0,street:0};
      searching=true;                       // tell moveend: don't record this move
      setActiveTab(t in levelFor?levelFor[t]:0);
      if(f.bbox){
        // Allow small places to come in close; keep big areas appropriately wide.
        const mz={place:16,locality:16,district:14,postcode:16,
                  neighborhood:16.5,region:11,country:9}[t]||15.5;
        flyToBounds([[f.bbox[0],f.bbox[1]],[f.bbox[2],f.bbox[3]]],mz);
      }else{
        // No bbox = a precise point (address / POI). Go in close and pin it.
        const z=(t==='address')?17.5:(t==='poi')?16.5:15;
        flyProgrammatic({center:f.center,zoom:z,duration:2000,offset:[-60,-80]});
      }
      if(t==='address'||t==='poi') dropSearchMarker(f.center,name);
      showMsg('Sensing the aura of '+name+'...');
    } else showMsg('Location not found — try a postcode, town, or full address');
  }catch(e){showMsg('Search unavailable — try again shortly');}
};
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('sg').click()});

const socTip=document.getElementById('soc-tip-el');
document.querySelectorAll('.soc-btn').forEach(b=>{
  b.onmouseenter=e=>{
    socTip.textContent=b.dataset.tip+' — coming soon';
    socTip.style.display='block';
    socTip.style.top=(e.clientY+12)+'px';
    socTip.style.left=Math.min(e.clientX-30,window.innerWidth-180)+'px';
  };
  b.onmouseleave=()=>{socTip.style.display='none'};
  b.onclick=()=>showMsg('Social sharing — coming in v1');
});
});
</script>
