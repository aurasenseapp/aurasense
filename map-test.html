<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurasense — Map Proof of Concept</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.24.1/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.24.1/mapbox-gl.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #000; }
  #map  { position: absolute; inset: 0; }
  #aura { position: absolute; inset: 0; pointer-events: none; }
  #note {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #d7d2ec; background: rgba(20, 16, 40, .6);
    padding: 9px 13px; border-radius: 11px;
    backdrop-filter: blur(6px); max-width: 250px;
  }
</style>
</head>
<body>
  <div id="map"></div>
  <canvas id="aura"></canvas>
  <div id="note">Aurasense map test — pan and zoom around. The auras should stay pinned to their places and gently breathe.</div>

<script>
  // ──────────────────────────────────────────────────────────────
  //  PASTE YOUR MAPBOX TOKEN BELOW — the long string starting "pk."
  // ──────────────────────────────────────────────────────────────
  mapboxgl.accessToken = 'pk.eyJ1IjoiYXVyYXNlbnNlIiwiYSI6ImNtcWpvMnk5MTBobGoycHB6OHplaXBrODQifQ.BAQJA0r7fK3BvW-k1kFHiw';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-0.128, 51.508],   // London — note Mapbox order is [longitude, latitude]
    zoom: 14
  });

  // A handful of sample senses around London, just to feel the look.
  // Each is { lng, lat, color }.
  const auraPoints = [
    { lng: -0.128, lat: 51.508, color: '#a78bfa' }, // violet
    { lng: -0.122, lat: 51.511, color: '#5eead4' }, // teal
    { lng: -0.131, lat: 51.505, color: '#fbbf24' }, // amber
    { lng: -0.124, lat: 51.506, color: '#fb7185' }, // rose
    { lng: -0.135, lat: 51.510, color: '#38bdf8' }  // sky
  ];

  const canvas = document.getElementById('aura');
  const ctx = canvas.getContext('2d');

  // Keep the canvas the same size as the map, sharp on retina screens.
  function sizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const w = map.getContainer().clientWidth;
    const h = map.getContainer().clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // Turn '#rrggbb' plus an alpha into an 'rgba(...)' string.
  function hexA(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function draw() {
    const w = map.getContainer().clientWidth;
    const h = map.getContainer().clientHeight;
    ctx.clearRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter'; // glows add together where they overlap

    const t = performance.now() / 1000;

    auraPoints.forEach((pt, i) => {
      const p = map.project([pt.lng, pt.lat]); // a place -> its position on screen
      const breath = 0.85 + Math.sin(t * 1.0 + i) * 0.15;
      const r = 70 * breath;

      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
      glow.addColorStop(0,   hexA(pt.color, 0.55));
      glow.addColorStop(0.4, hexA(pt.color, 0.25));
      glow.addColorStop(1,   hexA(pt.color, 0));
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();

      const cr = 6 * breath; // bright little core
      const core = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, cr);
      core.addColorStop(0, hexA('#ffffff', 0.9));
      core.addColorStop(1, hexA(pt.color, 0));
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(p.x, p.y, cr, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(draw);
  }

  map.on('load', () => {
    sizeCanvas();
    requestAnimationFrame(draw);
  });
  map.on('resize', sizeCanvas);
  window.addEventListener('resize', sizeCanvas);
</script>
</body>
</html>
